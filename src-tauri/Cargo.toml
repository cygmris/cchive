[package]
name = "clavis"
version = "0.1.0"
description = "Clavis"
edition = "2021"
rust-version = "1.77.2"

# The library powering the desktop binary; the GUI entry point lives in main.rs.
[lib]
name = "clavis_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2.10", features = ["tray-icon", "image-png"] }
tauri-plugin-store = "2.4.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Single-instance is desktop-only; registered first in the builder.
[target.'cfg(not(any(target_os = "android", target_os = "ios")))'.dependencies]
tauri-plugin-single-instance = "2.4.2"
