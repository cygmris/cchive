<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clavis</title>
    <!--
      Pre-React paint: show the app surface (not white) on the very first frame.
      The hex mirrors the --app-bg token (sand-50 light / espresso-750 dark);
      once the bundle's tokens load, body keeps the same surface seamlessly.
    -->
    <style>
      html,
      body {
        margin: 0;
        background: #faf8f4;
      }
      /* Pre-React boot spinner inside #root; React replaces #root's contents on
         mount, so it vanishes the instant the app paints. Muted tone mirrors
         --border / --text-3 so it reads as a calm "loading", never a blank wait. */
      .clavis-boot {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .clavis-boot::after {
        content: "";
        width: 26px;
        height: 26px;
        border-radius: 50%;
        border: 2.5px solid #e4dccf;
        border-top-color: #9a8f80;
        animation: clavis-spin 0.7s linear infinite;
      }
      @keyframes clavis-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-color-scheme: dark) {
        html,
        body {
          background: #1a1714;
        }
        .clavis-boot::after {
          border-color: #36302a;
          border-top-color: #8a8073;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"><div class="clavis-boot"></div></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
